//	==================================================
//	BE-4 global engine configuration.
//
//	Manufacturer: Blue Origin
//
//	=================================================================================
//	BE-4
//	Vulcan, New Glenn
//
//	Dry Mass: 2250 Kg
//	Thrust (SL): 2400 kN
//	Thrust (Vac): 2647.5 kN
//	ISP: 305 SL / 341 Vac
//	Burn Time: 400
//	Chamber Pressure: 13.4 MPa
//	Propellant: LOX / CH4
//	Prop Ratio: 3.6
//	Throttle: 40% to 100%
//	Nozzle Ratio: 40
//	Ignitions: 4
//	=================================================================================

//	Sources:

//	Blue Origin - BE-4 engine:						https://www.blueorigin.com/be4
//	United Launch Alliance - BE-4 rocket engine:	http://www.ulalaunch.com/uploads/docs/BE-4_Fact_Sheet_Web_Final_2.pdf
//	Space Launch Report - Vulcan launch vehicle:	http://www.spacelaunchreport.com/vulcan.html
//	NASASpaceFlight - IAF Blue Origin presentation: https://forum.nasaspaceflight.com/index.php?topic=10685.msg1665037#msg1665037

//	Used by:

//	* BigBlueRefilled

//	==================================================

@PART[BBR_26_JE_JE4]:NEEDS[RealismOverhaul]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
	%category = Engine
	%title = #roBE4Title	//BE-4
	%manufacturer = #roMfrBO
	%description = #roBE4Desc	//The BE-4 is an oxidizer-rich staged combustion methalox engine. Though initially developed for use on a Blue Origin launch vehicle, United Launch Alliance announced in 2014 that their new Vulcan launch vehicle will be powered by a pair of BE-4 engines.

	@tags ^= :$: USA blue origin bo be-4 liquid pump booster lqdhydrogen lqdoxygen

	%specLevel = prototype

	@MODULE[ModuleEngines*]
	{
		%EngineType = LiquidFuel
	}

	!MODULE[ModuleEngineConfigs],*{}
	!MODULE[ModuleAlternator],*{}
	!RESOURCE,*{}

	@MODULE[ModuleGimbal],*
	{
		@gimbalRange = 5.0 // questin really wants this to be 5 
		%useGimbalResponseSpeed = True
		%gimbalResponseSpeed = 16
	}

	MODULE
	{
		name = ModuleEngineConfigs
		type = ModuleEngines
		configuration = BE-4 550,000lbf
		origMass = 2.25

		CONFIG
		{
			name = BE-4 550,000lbf
			specLevel = prototype
			minThrust = 978.608
			maxThrust = 2446.52
			heatProduction = 100
			massMult = 1.0
			ullage = True
			pressureFed = False
			ignitions = 4

			IGNITOR_RESOURCE
			{
				name = ElectricCharge
				amount = 0.5
			}

			PROPELLANT
			{
				name = LqdMethane
				ratio = 0.4268
				DrawGauge = True
			}

			PROPELLANT
			{
				name = LqdOxygen
				ratio = 0.5732
				DrawGauge = False
			}

			atmosphereCurve
			{
				key = 0 341
				key = 1 305
			}

			TESTFLIGHT:NEEDS[TestLite|TestFlight]
			{
				name = BE-4_550
				testedBurnTime = 1590	//Assume same as RD-180
				ratedBurnTime = 400
				safeOverburn = true
				
				// assume roughly exponential relationship between chamber pressure and lifespan
				thrustModifier
				{
					key = 0.00 0.05 0 0
					key = 1.00 1.00 3 3
				}
				
				ignitionReliabilityStart = 0.98
				ignitionReliabilityEnd = 0.995
				cycleReliabilityStart = 0.98
				cycleReliabilityEnd = 0.995
			}
		}
		CONFIG
		{
			name = BE-4 640,000lbf
			specLevel = prototype
			minThrust = 978.608
			maxThrust = 2846.86
			heatProduction = 100
			massMult = 1.0
			ullage = True
			pressureFed = False
			ignitions = 4

			IGNITOR_RESOURCE
			{
				name = ElectricCharge
				amount = 0.5
			}

			PROPELLANT
			{
				name = CooledLqdMethane
				ratio = 0.4268
				DrawGauge = True
			}

			PROPELLANT
			{
				name = CooledLqdOxygen
				ratio = 0.5732
				DrawGauge = False
			}

			atmosphereCurve
			{
				key = 0 350
				key = 1 310
			}

			TESTFLIGHT:NEEDS[TestLite|TestFlight]
			{
				name = BE-4_640
				testedBurnTime = 1590	//Assume same as RD-180
				ratedBurnTime = 400
				safeOverburn = true
				
				// assume roughly exponential relationship between chamber pressure and lifespan
				thrustModifier
				{
					key = 0.00 0.05 0 0
					key = 1.00 1.00 3 3
				}
				
				ignitionReliabilityStart = 0.98
				ignitionReliabilityEnd = 0.995
				cycleReliabilityStart = 0.98
				cycleReliabilityEnd = 0.995
			}
		}
	}
}
@PART[BBR_26_JE_JE4]:AFTER[RealismOverhaulEngines]
{
	@MODULE[ModuleEngineConfigs]
	{
		@CONFIG,*
		{
			%LinkB9PSModule[engineSwitch] { subtype = BE-4 }
		}
		@CONFIG[BE-4 640,000lbf]
		{
			@LinkB9PSModule[engineSwitch] { @subtype = BE-4 V2 }
		}
	}
}
