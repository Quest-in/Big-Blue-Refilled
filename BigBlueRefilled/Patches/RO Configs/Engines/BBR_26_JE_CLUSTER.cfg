			            %key = 12 0.001
		            }
				}
			}
		}

		@SUBTYPE,1
		{
			@MODULE,0
			{
				@IDENTIFIER,0
				{
					@name = ModuleEnginesRF
				}
				@DATA
				{
					%minThrust = 4554.976
					%maxThrust = 9786.08

					%atmosphereCurve
		            {
			            %key = 0 350
			            %key = 1 310
			            %key = 12 0.001
		            }
				}
			}
			@MODULE,1
			{
				@IDENTIFIER,0
				{
					@name = ModuleEnginesRF
				}
				@DATA
				{
					%minThrust = 2277.488
					%maxThrust = 4893.04

					%atmosphereCurve
