	@MODULE[ModuleEngines*],*
	{
		!PROPELLANT[*]{}
		%EngineType = LiquidFuel
		ullage = True
		pressureFed = False
		ignitions = 4
		%PROPELLANT
		{
			name = CooledLqdMethane
			ratio = 0.4268
			DrawGauge = True
		}
		%PROPELLANT
		{
			name = CooledLqdOxygen
			ratio = 0.5732
			DrawGauge = False
		}
		IGNITOR_RESOURCE
		{
			name = ElectricCharge
			amount = 0.5
		}
		TESTFLIGHT:NEEDS[TestLite|TestFlight]
			{
				testedBurnTime = 1590	//Assume same as RD-180
				ratedBurnTime = 400
				safeOverburn = true
				// assume roughly exponential relationship between chamber pressure and lifespan
				thrustModifier
				{
					key = 0.00 0.05 0 0
					key = 1.00 1.00 3 3
				}

				ignitionReliabilityStart = 0.98
				ignitionReliabilityEnd = 0.995
				cycleReliabilityStart = 0.98
				cycleReliabilityEnd = 0.995
				techTransfer = BE-4:50
			}
	}

	@MODULE[ModuleGimbal],*
	{
		@gimbalRange = 5
		%useGimbalResponseSpeed = True
		%gimbalResponseSpeed = 16
	}

	MODULE
	{
		name = ModuleEngineConfigs
		type = ModuleEngines
		configuration = BE-4
		CONFIG
		{
			name = BE-4 550,000lbf
			specLevel = operational
			massMult = 1.0
			LinkB9PSModule[BE4BlockSwitch]
            { 
                subtype = B1
            } 
		}
		CONFIG
		{
			name = BE-4 640,000lbf
			specLevel = prototype
			massMult = 1.0
			LinkB9PSModule[BE4BlockSwitch]
            { 
                subtype = B2
            } 
		}
	}
}