@PART[BBR_26_Jacana_JS1]:NEEDS[RealismOverhaul]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
    MODULE
    {
        name = ModuleFuelTanks
        volume = 1400000
        type = Tank-Iso-AlLi
        basemass = -1 // idk what to put here so i'm copying sep, hope u understand kari :3 
    }
}
@PART[BBR_26_Jacana_Interstage]:NEEDS[RealismOverhaul]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
    MODULE
    {
        name = ModuleFuelTanks
        volume = 750
        type = Tank-Iso-Comp-HP
        basemass = -1 // idk what to put here so i'm copying sep, hope u understand kari :3
        TANK
        {
            name = HTP
            amount = Full
            maxAmount = 100%
        } 
    }
}
@PART[BBR_26_Jacana_Fin]:NEEDS[RealismOverhaul]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
    @MODULE[ModuleControlSurface]
    {
        actuatorSpeed = 12.5
    }
}
@PART[BBR_26_Jacana_Aft]:NEEDS[RealismOverhaul&RealismOverhaulEngines]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
    !MODULE[ModuleEngineConfigs],*{}
	!MODULE[ModuleAlternator],*{}
	!RESOURCE,*{}
    !MODULE[ModuleGimbal],*{}
    MODULE
	{
		name = ModuleEngineConfigs
		type = ModuleEngines
		configuration = PDBlock1
		origMass = 22
        CONFIG
        {
            name = PDBlock1
            maxThrust = 1
            ignitions = 0
            heatProduction = 0
            ullage = false
            PROPELLANT
            {
                name = LqdMethane
                ratio = 0.04268
                DrawGauge = False
            }
            PROPELLANT
            {
                name = LqdOxygen
                ratio = 0.05732
                DrawGauge = False
            }
        }
        CONFIG
        {
            name = PDBlock2
            maxThrust = 1
            ignitions = 0
            heatProduction = 0
            ullage = false
            PROPELLANT
            {
                name = CooledLqdMethane
                ratio = 0.04268
                DrawGauge = False
            }
            PROPELLANT
            {
                name = CooledLqdOxygen
                ratio = 0.05732
                DrawGauge = False
            }
        }
    }
}