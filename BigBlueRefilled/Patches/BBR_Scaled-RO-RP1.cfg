// Ripped stright from FNB, which was ripped stright from SEP
@PART[BBR*]:NEEDS[SolSystem,!RealSolarSystem]:BEFORE[BigBlueRefilled]
{
    %SystemScale = #$@Sol_Configuration/SystemScale$
}
@PART[BBR*]:NEEDS[RealSolarSystem,!SolSystem]:BEFORE[BigBlueRefilled]
{
    %SystemScale = Real
}
@PART[BBR*]:FINAL
{
	!SystemScale = delete
}
@PART[BBR*]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
	@rescaleFactor = 1
	@breakingForce = 300
	@breakingTorque = 300
	@crashTolerance = 7
	@maxTemp = 2100
}
@PART[BBR*]:NEEDS[RealismOverhaul]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
    %RSSROConfig = true
    !RESOURCE[LqdMethane] {}
    !RESOURCE[LqdHydrogen] {}
	!RESOURCE[Oxidizer] {}
    !RESOURCE[MonoPropellant] {}
    @MODULE[ModuleRCSFX],*
    {
    @thrusterPower = 2.5
		!PROPELLANT[MonoPropellant] {}
		PROPELLANT
		{
			name = HTP
			ratio = 0.25
        }
    }
} 
@PART[BBR*]:NEEDS[zzzRP-0] // Cop-out RP-0 tree placement for now
{
    %RP0conf = true
    %TechRequired = ORPHANS
}
@PART[BBR*]:HAS[@MODULE[ModuleCommand]]:NEEDS[RP-0]:AFTER[BigBlueRefilled] // sorry kari, stealing this one too
{

	!MODULE[ModuleAvionics] {}
	
	@MODULE[ModuleCommand]
	{
		!RESOURCE,* {}
		%hasHibernation = false
	}
	MODULE
	{
		name = ModuleAvionics
		massLimit = 10000.0
		interplanetary = True
		toggleable = true
		disabledkW = 0.1
		enabledkW = 1.3
	}

	MODULE:NEEDS[kOS]
	{
		name = kOSProcessor
		diskSpace = 50000
		diskSpaceCostFactor = 0.001		  // 50F for double space
		diskSpaceMassFactor = 0.00000005  // 2.5 kg for double space
		ECPerInstruction = 0.00000008	  // 8W @ 2000 IPU
	}
}