@PART[BBR_26_JE_JE3U]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
    @mass = 0.73
}
@PART[BBR_26_JE_JE3U]:NEEDS[!RealismOverhaul]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
	@MODULE[ModuleEnginesFX]
    {
        @maxThrust = 889.64
    }
    !MODULE:HAS[#moduleID[engineSwitch]] {}
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = engineSwitch
		switcherDescription = Engine Block Switch
		switchInFlight = False
		SUBTYPE
		{
			name = BE-3U
			title = JE-3U Block 1
			primaryColor = Cyan
			secondaryColor = Blue
		}
		SUBTYPE
		{
			name = BE-3U V2
			title = JE-3U Block 2
			primaryColor = Orange
			secondaryColor = Blue
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEnginesFX
					engineID = BE3U
				}
				DATA
				{
					maxThrust = 940.79
				}
			}
		}
	}
}
@PART[BBR_26_JE_JE3U]:HAS[#SystemScale[?eal]]:FOR[ZZZ_BigBlueRefilled]
{
    @breakingForce = 3000 // stage sep is my passion
	@breakingTorque = 3000
	@crashTolerance = 250
}