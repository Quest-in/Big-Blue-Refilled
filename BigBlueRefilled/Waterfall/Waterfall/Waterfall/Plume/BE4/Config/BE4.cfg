@PART[BBR_26_JE_JE4]
{
!MODULE[ModuleWaterfallFX],* {}
    MODULE
{
	name = ModuleWaterfallFX
	moduleID = BE4
	engineID = BE4
	CONTROLLER
    {
        name = atmosphereDepth
        linkedTo = atmosphere_density
    }
    CONTROLLER
    {
        name = throttle
        linkedTo = throttle
    }
    CONTROLLER
    {
        name = random
        linkedTo = random
        range = -1,1
    }
	ENGINEEVENTCONTROLLER
	{
		eventName = ignition
		eventDuration = 2
		name = startup
		eventCurve
		{
			key = 0 0 0 0
			key = 2 2 0 0
		}
	}
	ENGINEEVENTCONTROLLER
	{
		eventName = flameout
		engineID = BE4
		eventDuration = 4
		name = shutdown
		eventCurve
		{
			key = 0 0 0 0
			key = 4 4 0 0
		}
	}
CONTROLLER
{
    name = Sunlight
    linkedTo = custom
}
	TEMPLATE
	{
		templateName = BE4N
		position = 0,0,0
		rotation = 0,180,0
		scale = 0.675000012,0.675000012,0.675000012 
	    }
    }
}
