@PART[BBR_26_JE_JE3U]:NEEDS[Waterfall]{
    !MODULE[ModuleWaterfallFX],* {}
MODULE
{
	name = ModuleWaterfallFX
	moduleID = BE3U
	engineID = BE3U
	CONTROLLER
    {
        name = atmosphereDepth
        linkedTo = atmosphere_density
    }
    CONTROLLER
    {
        name = throttle
        linkedTo = throttle
    }
    CONTROLLER
    {
        name = random
        linkedTo = random
        range = -1,1
    }
	ENGINEEVENTCONTROLLER
	{
		eventName = ignition
		eventDuration = 2
		name = startup
        engineID = BE3U
		eventCurve
		{
			key = 0 0 0 0
			key = 2 2 0 0
		}
	}
	ENGINEEVENTCONTROLLER
	{
		eventName = flameout
		engineID = BE3U
		eventDuration = 4
		name = shutdown
		eventCurve
		{
			key = 0 0 0 0
			key = 4 4 0 0
		}
	}
	TEMPLATE
	{
		templateName = BE3U
		position = 0,0,0
		rotation = 0,0,0
		scale = 0.675000012,0.675000012,0.675000012
       
	    }
    }
}
@PART[BBR_26_JE_JE3U]:HAS[#SystemScale[?eal]]:AFTER[BigBlueRefilled]
{
    @MODULE[ModuleWaterfallFX]
    {
        @CONTROLLER[Sunlight]
        {
            @TEMPLATE[BE3U]
            {
                @scale = 1.08,1.08,1.08
            }
        }
    }
}