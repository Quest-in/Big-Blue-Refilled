@PART[BBR_26_JE_JESPIKE]:NEEDS[RealismOverhaul]:HAS[#SystemScale[?eal]]:FOR[BigBlueRefilled]
{
	%specLevel = prototype

	@MODULE[ModuleEngines*]
	{
		%EngineType = LiquidFuel
	}

	!MODULE[ModuleEngineConfigs],*{}
	!MODULE[ModuleAlternator] {}
	!RESOURCE,*{}

	@MODULE[ModuleGimbal]
	{
		%gimbalRange = 5
		%useGimbalResponseSpeed = true
		%gimbalResponseSpeed = 8
	}

	MODULE
	{
		name = ModuleEngineConfigs
		origMass = 5.5
		configuration = BE-SPIKE
		modded = false
		CONFIG
		{
			name = BE-SPIKE
			specLevel = operational
			maxThrust = 2224.1
			minThrust = 400.34
			PROPELLANT
			{
				name = LqdHydrogen
				ratio = 0.7286
				DrawGauge = true
			}
			PROPELLANT
			{
				name = LqdOxygen
				ratio = 0.2714
			}
			atmosphereCurve
			{
				key = 0 380
				key = 1 375
			}
			ullage = True
			ignitions = 0
			IGNITOR_RESOURCE
			{
				name = ElectricCharge
				amount = 0.500
			}

			// Insufficient data, just use BE-3PM data
			TESTFLIGHT:NEEDS[TestLite|TestFlight]
			{
				testedBurnTime = 9100		//Tested to 9100 seconds? Fairly simple and understressed engine, designed to be reused.
				ratedBurnTime = 644
				safeOverburn = true
				overburnPenalty `= 1.0

				// assume roughly exponential relationship between chamber pressure and lifespan
				thrustModifier
				{
					key = 0.00 0.05 0 0
					key = 1.00 1.00 3 3
				}
				
				ignitionReliabilityStart = 0.988095
				ignitionReliabilityEnd = 0.997619
				cycleReliabilityStart = 0.977273
				cycleReliabilityEnd = 0.995455
			}
		}
			// Insufficient data, just use BE-3PM data
		TESTFLIGHT:NEEDS[TestLite|TestFlight]
		{
			testedBurnTime = 9100		//Tested to 9100 seconds? Fairly simple and understressed engine, designed to be reused.
			ratedBurnTime = 644
			safeOverburn = true
			overburnPenalty = 1.0
			// assume roughly exponential relationship between chamber pressure and lifespan
			thrustModifier
			{
				key = 0.00 0.05 0 0
				key = 1.00 1.00 3 3
			}			
            ignitionReliabilityStart = 0.988095
			ignitionReliabilityEnd = 0.997619
			cycleReliabilityStart = 0.977273
			cycleReliabilityEnd = 0.995455
		}
	}
	MODULE
    {
        name = ModuleFuelTanks
        volume = 750
        type = Tank-Iso-Comp-HP
        basemass = -1
        TANK
        {
            name = HTP
            amount = Full
            maxAmount = 100%
        } 
    }
}